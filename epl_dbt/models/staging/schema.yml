version: 2

models:
  - name: stg_matches
    description: "Cleaned EPL match data"
    columns:
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: result
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['H', 'A', 'D']

  - name: int_team_stats
    description: "Per team per season stats split by home/away"
    columns:
      - name: team
        tests:
          - not_null
      - name: season
        tests:
          - not_null
