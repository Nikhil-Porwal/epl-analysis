name: epl-analysis-pipeline
start_date: "2024-01-01"

assets:
    - name: ingest_kaggle
      type: python
      path: assets/ingest_kaggle.py
      description: "Validates raw Kaggle EPL CSV — checks columns, seasons, nulls"

    - name: spark_transform
      type: python
      path: assets/spark_transform.py
      description: "Flattens, cleans and enriches raw CSV → Parquet in data/staging/"
      depends_on:
          - assets/ingest_kaggle.py

    - name: load_snowflake
      type: python
      path: assets/load_snowflake.py
      description: "Loads Parquet files into Snowflake EPL_DB.RAW.matches"
      depends_on:
          - assets/spark_transform.py

    - name: run_dbt
      type: python
      path: assets/run_dbt.py
      description: "Runs dbt staging + intermediate + mart models"
      depends_on:
          - assets/load_snowflake.py